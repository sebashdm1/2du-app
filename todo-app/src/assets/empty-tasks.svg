<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main { stroke: #000000; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .accent { stroke: #FF0080; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .accent-fill { fill: #FF0080; }
  </style>

  <!-- Clipboard -->
  <rect x="70" y="60" width="100" height="120" rx="14" class="main"/>

  <!-- Clip -->
  <rect x="100" y="45" width="40" height="25" rx="8" class="main"/>

  <!-- Cara -->
  <circle cx="105" cy="105" r="2.5" fill="#000000"/>
  <circle cx="135" cy="105" r="2.5" fill="#000000"/>
  <line x1="108" y1="120" x2="132" y2="120" class="main"/>

  <!-- Líneas -->
  <line x1="90" y1="140" x2="150" y2="140" class="main"/>
  <line x1="90" y1="155" x2="140" y2="155" class="main"/>

  <!-- Botón + -->
  <circle cx="170" cy="170" r="20" class="accent"/>
  <line x1="170" y1="158" x2="170" y2="182" class="accent"/>
  <line x1="158" y1="170" x2="182" y2="170" class="accent"/>

  <!-- Sparkles -->
  <line x1="55" y1="90" x2="65" y2="90" class="accent"/>
  <line x1="60" y1="85" x2="60" y2="95" class="accent"/>

  <line x1="180" y1="85" x2="190" y2="85" class="accent"/>
  <line x1="185" y1="80" x2="185" y2="90" class="accent"/>

  <!-- Punto -->
  <circle cx="60" cy="150" r="3" class="accent-fill"/>
</svg>
