<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main { stroke: #000000; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .accent { stroke: #FF0080; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .accent-fill { fill: #FF0080; }
  </style>

  <!-- Tag principal -->
  <path d="M70 110 L120 60 H170 L170 130 L120 180 L70 130 Z" class="main"/>

  <!-- Huequito del tag -->
  <circle cx="145" cy="85" r="4" class="main"/>

  <!-- Cara -->
  <circle cx="105" cy="115" r="2.5" fill="#000000"/>
  <circle cx="130" cy="115" r="2.5" fill="#000000"/>
  <line x1="108" y1="130" x2="127" y2="130" class="main"/>

  <!-- Botón + arriba -->
  <circle cx="180" cy="60" r="18" class="accent"/>
  <line x1="180" y1="50" x2="180" y2="70" class="accent"/>
  <line x1="170" y1="60" x2="190" y2="60" class="accent"/>

  <!-- Sparkles -->
  <line x1="60" y1="80" x2="70" y2="80" class="accent"/>
  <line x1="65" y1="75" x2="65" y2="85" class="accent"/>

  <line x1="160" y1="170" x2="170" y2="170" class="accent"/>
  <line x1="165" y1="165" x2="165" y2="175" class="accent"/>

  <!-- Puntico -->
  <circle cx="75" cy="165" r="3" class="accent-fill"/>
</svg>
