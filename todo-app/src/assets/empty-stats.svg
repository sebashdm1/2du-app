<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main { stroke: #000000; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .accent { stroke: #FF0080; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .accent-fill { fill: #FF0080; }
  </style>

  <!-- Base chart -->
  <line x1="60" y1="170" x2="180" y2="170" class="main"/>
  <line x1="60" y1="170" x2="60" y2="90" class="main"/>

  <!-- Barras (bajitas = sin data) -->
  <rect x="80" y="150" width="15" height="20" class="main"/>
  <rect x="110" y="155" width="15" height="15" class="main"/>
  <rect x="140" y="158" width="15" height="12" class="main"/>

  <!-- Línea (plana) -->
  <path d="M80 145 L110 150 L140 148" class="accent"/>

  <!-- Cara (meh) -->
  <circle cx="105" cy="115" r="2.5" fill="#000000"/>
  <circle cx="135" cy="115" r="2.5" fill="#000000"/>
  <line x1="108" y1="130" x2="132" y2="130" class="main"/>

  <!-- Sparkles -->
  <line x1="65" y1="95" x2="75" y2="95" class="accent"/>
  <line x1="70" y1="90" x2="70" y2="100" class="accent"/>

  <line x1="170" y1="100" x2="180" y2="100" class="accent"/>
  <line x1="175" y1="95" x2="175" y2="105" class="accent"/>

  <!-- Punto -->
  <circle cx="160" cy="150" r="3" class="accent-fill"/>
</svg>
